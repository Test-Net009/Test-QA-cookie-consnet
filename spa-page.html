<!DOCTYPE html>
<html>
<head>
<title>SPA Page</title>
<link rel="stylesheet" href="seqrite-config.css"/>
<script defer src="seqrite.js"></script>
<script defer src="seqrite-config.js"></script>
<script defer src="seqrite-enforcement.js"></script>
</head>
<body>
<h1>SPA Page</h1>
<script>
document.addEventListener('DOMContentLoaded',function(){
 if(!window.PrivacyConsent) return;
 function loadAnalytics(){ console.log('Analytics Loaded'); }
 if(PrivacyConsent.getConsent('analytics')) loadAnalytics();
 PrivacyConsent.watch(function(c){ if(c['analytics']===true) loadAnalytics();});
});
</script>
</body>
</html>
